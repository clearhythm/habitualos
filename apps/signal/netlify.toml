[build]
  base = "apps/signal"
  ignore = "cd $(git rev-parse --show-toplevel) && git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/signal/ packages/"
  command = "cd $(git rev-parse --show-toplevel) && pnpm install && pnpm --filter signal build"
  publish = "_site"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[dev]
  framework = "#custom"
  command = "pnpm --filter signal run eleventy:serve"
  targetPort = 8080
  autoLaunch = false

[functions]
  node_bundler = "esbuild"
  node_version = "20"

[[edge_functions]]
  path = "/api/signal-chat-stream"
  function = "chat-stream"

[[redirects]]
  from = "/meet/*"
  to = "/meet/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
