# =============================================================================
# Netlify Configuration for dreamscape
# Set "Package directory" to "apps/dreamscape" in Netlify UI.
# =============================================================================
[build]
  base = "apps/dreamscape"
  ignore = "cd $(git rev-parse --show-toplevel) && git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/dreamscape/ packages/edge-functions/"
  command = "cd $(git rev-parse --show-toplevel) && pnpm install && mkdir -p apps/dreamscape/netlify/edge-functions/_lib && cp packages/edge-functions/chat-stream-core.ts apps/dreamscape/netlify/edge-functions/_lib/ && pnpm --filter dreamscape build"
  publish = "_site"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[dev]
  framework = "#custom"
  command = "pnpm --filter dreamscape run eleventy:serve"
  targetPort = 8080
  autoLaunch = false
  functions = "netlify/functions"
  publish = "_site"
  edge_functions = "netlify/edge-functions"

# =============================================================================
# Node.js Functions
# =============================================================================

[functions]
  node_bundler = "esbuild"

# =============================================================================
# Edge Functions
# =============================================================================

[[edge_functions]]
  path = "/api/chat-stream"
  function = "chat-stream"

# =============================================================================
# Redirects
# =============================================================================

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

