# =============================================================================
# Netlify Configuration for tico-talk
# Set "Package directory" to "apps/tico-talk" in Netlify UI.
# =============================================================================
[build]
  base = "apps/tico-talk"
  ignore = "! git diff-tree --no-commit-id -r --name-only $COMMIT_REF | grep -E '^apps/tico-talk/' | grep -c ."
  command = "cd $(git rev-parse --show-toplevel) && pnpm install && pnpm --filter tico-talk build"
  publish = "_site"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[dev]
  framework = "#custom"
  command = "pnpm --filter tico-talk run eleventy:serve"
  targetPort = 8081
  port = 8890
  autoLaunch = false
  functions = "netlify/functions"
  publish = "_site"
  edge_functions = "netlify/edge-functions"

# =============================================================================
# Node.js Functions
# =============================================================================

[functions]
  node_bundler = "esbuild"

# =============================================================================
# Edge Functions
# =============================================================================

[[edge_functions]]
  path = "/*"
  function = "auth"

# =============================================================================
# Redirects
# =============================================================================

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
